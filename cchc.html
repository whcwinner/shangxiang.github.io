    const PI = Math.PI;
    const a = 6378245.0;
    const ee = 0.00669342162296594323;
    function bd09ToGcj02(bd_lon, bd_lat) {
        const x_pi = PI * 3000.0 / 180.0;
        const x = bd_lon - 0.0065;
        const y = bd_lat - 0.006;
        const z = Math.sqrt(x * x + y * y) - 0.00002 * Math.sin(y * x_pi);
        const theta = Math.atan2(y, x) - 0.000003 * Math.cos(x * x_pi);
        return [z * Math.cos(theta), z * Math.sin(theta)];
    }
    function outOfChina(lon, lat) {
        return !(lon > 73.66 && lon < 135.05 && lat > 3.86 && lat < 53.55);
    }
    function transformLat(x, y) {
        let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
        ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
        ret += (20.0 * Math.sin(y * PI) + 40.0 * Math.sin(y / 3.0 * PI)) * 2.0 / 3.0;
        ret += (160.0 * Math.sin(y / 12.0 * PI) + 320 * Math.sin(y * PI / 30.0)) * 2.0 / 3.0;
        return ret;
    }
    function transformLon(x, y) {
        let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
        ret += (20.0 * Math.sin(6.0 * x * PI) + 20.0 * Math.sin(2.0 * x * PI)) * 2.0 / 3.0;
        ret += (20.0 * Math.sin(x * PI) + 40.0 * Math.sin(x / 3.0 * PI)) * 2.0 / 3.0;
        ret += (150.0 * Math.sin(x / 12.0 * PI) + 300.0 * Math.sin(x / 30.0 * PI)) * 2.0 / 3.0;
        return ret;
    }
    function gcj02ToWgs84(gcj_lon, gcj_lat) {
        if (outOfChina(gcj_lon, gcj_lat)) return [gcj_lon, gcj_lat];
        let dlat = transformLat(gcj_lon - 105.0, gcj_lat - 35.0);
        let dlon = transformLon(gcj_lon - 105.0, gcj_lat - 35.0);
        const radlat = gcj_lat / 180.0 * PI;
        let magic = Math.sin(radlat);
        magic = 1 - ee * magic * magic;
        const sqrtmagic = Math.sqrt(magic);
        dlat = (dlat * 180.0) / ((a * (1 - ee)) / (magic * sqrtmagic) * PI);
        dlon = (dlon * 180.0) / (a / sqrtmagic * Math.cos(radlat) * PI);
        const mglat = gcj_lat + dlat;
        const mglon = gcj_lon + dlon;
        return [gcj_lon * 2 - mglon, gcj_lat * 2 - mglat];
    }
    function bd09ToWgs84(bd_lon, bd_lat) {
        const [gcj_lon, gcj_lat] = bd09ToGcj02(bd_lon, bd_lat);
        return gcj02ToWgs84(gcj_lon, gcj_lat);

            "闲置农房 5": {

                type: "闲置农房",

            "闲置农房 6": {

                type: "闲置农房",

                desc: "自然资源丰富"
            },
            "闲置农房 7": {
                coord: [117.423, 38.8911],
                type: "闲置农房",

                area: "80 平方米",
                flowOrNot: "是",
                haveAHomeOrNot: "是",
                desc: "自然资源丰富"
            },

        };

        // ✅ 创建点位并存储类型信息
        Object.keys(locationConfig).forEach(name => {
            const config = locationConfig[name];

            const marker = new ol.Feature({
                geometry: new ol.geom.Point(ol.proj.fromLonLat(config.coord)),
                name: name,
                gcjCoord: config.coord,
                type: config.type
            });

            // ✅ 闲置农房默认隐藏 (style 设为 null)，其他点位显示
            if (config.type === '闲置农房') {
                marker.setStyle(null);
            } else {
                marker.setStyle(createMarkerStyle(name, config));
            }

            vectorLayer.getSource().addFeature(marker);
            markers[name] = marker;
        });

        createPointInfoOverlay();
        createRouteInfoOverlay();

        // ✅ 产业筛选按钮事件
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilterType = this.getAttribute('data-type');
                applyFilter(currentFilterType);
                hidePointInfo();
                hideRouteInfo();
            });
        });

        // ✅ 应用筛选函数
        function applyFilter(filterType) {
            vectorLayer.getSource().getFeatures().forEach(feature => {
                const geometry = feature.getGeometry();
                if (!(geometry instanceof ol.geom.Point)) return;

                const name = feature.get('name');
                const type = feature.get('type');

                if (!name || !locationConfig[name]) return;

                let shouldShow = false;
                if (filterType === 'all') {
                    shouldShow = true;
                } else if (type === filterType) {
                    shouldShow = true;
                } else if (filterType === '一产' && type === '村委会') {
                    shouldShow = true;
                }

                // ✅ 闲置农房特殊处理：只有选择"闲置农房"或"全部"时才显示
                if (type === '闲置农房') {
                    if (filterType === '闲置农房' || filterType === 'all') {
                        shouldShow = true;
                    } else {
                        shouldShow = false;
                    }
                }

                feature.setStyle(shouldShow ? createMarkerStyle(name, locationConfig[name]) : null);
            });
        }

        // ✅ 创建样式函数 - 闲置农房使用扎点形状
        // ✅ 创建样式函数 - 闲置农房只显示大头针图标
        function createMarkerStyle(name, config) {
            // ✅ 闲置农房使用大头针 emoji + 不显示名称
            if (config.type === '闲置农房') {
                return new ol.style.Style({
                    image: new ol.style.Circle({
                        radius: 10,
                        fill: new ol.style.Fill({ color: config.color }),
                        stroke: new ol.style.Stroke({ color: '#fff', width: 2 })
                    }),
                    text: new ol.style.Text({
                        text: config.emoji,  // 显示 🏠 emoji
                        font: '10px Arial',
                        offsetY: -2,
                        fill: new ol.style.Fill({ color: '#fff' }),
                        stroke: new ol.style.Stroke({ color: 'rgba(0,0,0,0.5)', width: 2 })
                    }),
                    zIndex: 10
                });
            }

            // ✅ 普通点位使用圆形 + emoji + 名称标签
            return [
                new ol.style.Style({
                    image: new ol.style.Circle({
                        radius: 20,
                        fill: new ol.style.Fill({ color: config.color }),
                        stroke: new ol.style.Stroke({ color: '#fff', width: 2 })
                    }),
                    text: new ol.style.Text({
                        text: config.emoji,
                        font: '25px Arial',
                        offsetY: -2,
                        fill: new ol.style.Fill({ color: '#fff' }),
                        stroke: new ol.style.Stroke({ color: 'rgba(0,0,0,0.5)', width: 2 })
                    })
                }),
                new ol.style.Style({
                    text: new ol.style.Text({
                        text: name,
                        offsetY: -50,
                        offsetX: 0,
                        font: '14px Microsoft YaHei',
                        fill: new ol.style.Fill({ color: '#05ffcd' }),
                        stroke: new ol.style.Stroke({ color: '#000', width: 2 }),
                        backgroundFill: new ol.style.Fill({ color: 'rgba(0,0,0,0.7)' }),
                        backgroundStroke: new ol.style.Stroke({ color: '#000', width: 1 }),
                        backgroundRadius: 4,
                        padding: [4, 8, 4, 8]
                    })
                })
            ];
        }

        const calcBtn = document.getElementById('distance-calc-btn');
        calcBtn.addEventListener('click', function() {
            distanceCalcActive = !distanceCalcActive;
            if (distanceCalcActive) {
                calcBtn.classList.add('active');
                calcBtn.textContent = '关闭距离测算';
                hidePointInfo();
                hideRouteInfo();
                if (routeLayer) {
                    map.removeLayer(routeLayer);
                    routeLayer = null;
                }
            } else {
                calcBtn.classList.remove('active');
                calcBtn.textContent = '距离测算';
                hideRouteInfo();
                if (routeLayer) {
                    map.removeLayer(routeLayer);
                    routeLayer = null;
                }
            }
        });

        map.on('click', function(event) {
            if (pointInfoElement) {
                const pointOverlayRect = pointInfoElement.getBoundingClientRect();
                const clickInPointOverlay = event.pixel &&
                    event.pixel[0] >= pointOverlayRect.left &&
                    event.pixel[0] <= pointOverlayRect.right &&
                    event.pixel[1] >= pointOverlayRect.top &&
                    event.pixel[1] <= pointOverlayRect.bottom;
                if (clickInPointOverlay) return;
            }

            if (routeInfoElement) {
                const routeOverlayRect = routeInfoElement.getBoundingClientRect();
                const clickInRouteOverlay = event.pixel &&
                    event.pixel[0] >= routeOverlayRect.left &&
                    event.pixel[0] <= routeOverlayRect.right &&
                    event.pixel[1] >= routeOverlayRect.top &&
                    event.pixel[1] <= routeOverlayRect.bottom;
                if (clickInRouteOverlay) return;
            }

            map.forEachFeatureAtPixel(event.pixel, function(feature) {
                const geometry = feature.getGeometry();
                if (!(geometry instanceof ol.geom.Point)) {
                    return;
                }

                if (feature.getStyle() === null) {
                    return;
                }

                const name = feature.get('name');
                if (!name || !locationConfig[name]) return;

                if (distanceCalcActive) {
                    if (name !== "操场河村委会") {
                        calculateRoute(name, locationConfig);
                    }
                } else {
                    showPointInfo(name, locationConfig[name]);
                }
            }, {
                layerFilter: function(layer) {
                    return layer === vectorLayer;
                }
            });
        });

        // ✅ 根据点位类型动态显示不同字段
        function showPointInfo(pointName, pointData) {
            activePoint.name = pointName;
            activePoint.config = pointData;
            hideRouteInfo();

            document.getElementById('point-name').textContent = pointName;

            const contentDiv = document.getElementById('point-info-content');

            if (pointData.type === '闲置农房') {
                contentDiv.innerHTML = `
                    <p><span class="info-label">类型：</span><span class="info-value">${pointData.type}</span></p>
                    <p><span class="info-label">户主：</span><span class="info-value">${pointData.headOfHousehold || '无'}</span></p>
                    <p><span class="info-label">面积：</span><span class="info-value">${pointData.area || '无'}</span></p>
                    <p><span class="info-label">是否流转：</span><span class="info-value">${pointData.flowOrNot || '未知'}</span></p>
                    <p><span class="info-label">是否有房：</span><span class="info-value">${pointData.haveAHomeOrNot || '未知'}</span></p>
                    <p><span class="info-label">简介：</span><span class="info-value">${pointData.desc || '无'}</span></p>
                `;
            }else if (pointData.type === '村委会') {
                contentDiv.innerHTML = `
                    <p><span class="info-label">类型：</span><span class="info-value">${pointData.type}</span></p>
                    <p><span class="info-label">面积：</span><span class="info-value">${pointData.area || '无'}</span></p>
                    <p><span class="info-label">耕地面积：</span><span class="info-value">${pointData.ploughArea || '无'}</span></p>
                    <p><span class="info-label">常住人口：</span><span class="info-value">${pointData.permanentResidentPopulation || '无'}</span></p>
                    <p><span class="info-label">村集体成员：</span><span class="info-value">${pointData.members || '无'}</span></p>
                    <p><span class="info-label">党员人数：</span><span class="info-value">${pointData.partyMember || '无'}</span></p>
                    <p><span class="info-label">简介：</span><span class="info-value">${pointData.desc || '无'}</span></p>
                `;
            } else {
                contentDiv.innerHTML = `
                    <p><span class="info-label">类型：</span><span class="info-value">${pointData.type}</span></p>
                    <p><span class="info-label">面积：</span><span class="info-value">${pointData.area || '无'}</span></p>
                    <p><span class="info-label">年产量：</span><span class="info-value">${pointData.output || '无'}</span></p>
                    <p><span class="info-label">简介：</span><span class="info-value">${pointData.desc || '无'}</span></p>
                `;
            }

            const coord = ol.proj.fromLonLat(pointData.coord);
            pointInfoOverlay.setPosition(coord);

            pointInfoElement.classList.remove('active');
            void pointInfoElement.offsetWidth;
            pointInfoElement.classList.add('active');
        }

        function hidePointInfo() {
            if (pointInfoElement) {
                pointInfoElement.classList.remove('active');
            }
            activePoint.name = '';
            activePoint.config = null;
        }

        function hideRouteInfo() {
            if (routeInfoElement) {
                routeInfoElement.classList.remove('active');
            }
            if (routeInfoOverlay) {
                routeInfoOverlay.setPosition(undefined);
            }
        }

        function calculateRoute(endPointName, locConfig) {
            const startConfig = locConfig["操场河村委会"];
            const startGCJ = startConfig.coord;
            const endConfig = locConfig[endPointName];
            const endGCJ = endConfig.coord;

            if (routeLayer) {
                map.removeLayer(routeLayer);
                routeLayer = null;
            }

            hidePointInfo();

            document.getElementById('route-start').textContent = "操场河村委会";
            document.getElementById('route-end').textContent = endPointName;

            const url = `https://restapi.amap.com/v3/direction/driving?` +
                `origin=${startGCJ[0]},${startGCJ[1]}&` +
                `destination=${endGCJ[0]},${endGCJ[1]}&` +
                `key=${AMAP_KEY}&` +
                `output=json&` +
                `extensions=all`;

            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP 错误：${response.status}`);
                    return response.json();
                })
                .then(data => {
                    if (data && data.status === '1' && data.route && data.route.paths && data.route.paths.length > 0) {
                        const path = data.route.paths[0];
                        const distance = Number(path.distance) / 1000;
                        const duration = path.duration ? Number(path.duration) : distance * 120;

                        document.getElementById('route-distance').textContent = `${distance.toFixed(1)} km`;
                        document.getElementById('route-time').textContent = `${Math.round(duration/60)}分钟`;

                        let allCoordinates = [];
                        if (path.polyline) {
                            const coords = AMap.Polyline.decode(path.polyline);
                            coords.forEach(coord => {
                                allCoordinates.push(ol.proj.fromLonLat([coord.lng, coord.lat]));
                            });
                        } else {
                            allCoordinates = [
                                ol.proj.fromLonLat([startGCJ[0], startGCJ[1]]),
                                ol.proj.fromLonLat([endGCJ[0], endGCJ[1]])
                            ];
                        }

                        routeLayer = new ol.layer.Vector({
                            source: new ol.source.Vector({
                                features: [new ol.Feature({
                                    geometry: new ol.geom.LineString(allCoordinates)
                                })]
                            }),
                            style: new ol.style.Style({
                                stroke: new ol.style.Stroke({
                                    color: '#ff4444',
                                    width: 5,
                                    lineDash: [10, 5]
                                })
                            })
                        });
                        map.addLayer(routeLayer);

                        if (allCoordinates.length > 0) {
                            const routeExtent = new ol.extent.boundingExtent(allCoordinates);
                            map.getView().fit(routeExtent, { padding: [80, 50, 120, 50], duration: 1000 });

                            const midIndex = Math.floor(allCoordinates.length / 2);
                            const midCoord = allCoordinates[midIndex];

                            setTimeout(() => {
                                routeInfoOverlay.setPosition(midCoord);
                                routeInfoElement.classList.remove('active');
                                void routeInfoElement.offsetWidth;
                                routeInfoElement.classList.add('active');
                            }, 500);
                        }
                    } else {
                        alert(`无法获取路线信息：${data?.info || '未知错误'}`);
                    }
                })
                .catch(error => {
                    console.error('路线规划请求失败:', error);
                    alert(`路线规划请求失败：${error.message}`);
                });
        }

        console.log('地图初始化完成，所有点位已添加');
    };

    window.addEventListener('message', function(event) {
        if (event.origin !== 'https://modao.cc' && event.origin !== 'https://www.modao.cc') return;
        if (!map) return;
        if (event.data.action === 'zoomIn') {
            const currentZoom = map.getView().getZoom();
            if (currentZoom < map.getView().getMaxZoom()) map.getView().setZoom(currentZoom + 1);
        } else if (event.data.action === 'zoomOut') {
            const currentZoom = map.getView().getZoom();
            if (currentZoom > map.getView().getMinZoom()) map.getView().setZoom(currentZoom - 1);
        }
    }, false);
</script>
